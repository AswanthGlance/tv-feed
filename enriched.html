<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Glance TV — Enriched</title><style>
  :root {
    --violet-100: #EFEAFF;
    --violet-200: #D8CCFF;
    --violet-300: #B5A3FF;
    --violet-400: #9B86FF;
    --violet-500: #7E68F2;
    --violet-600: #5F4BD9;
    --bg-0: #07050C;
    --ink-0: #FFFFFF;
    --ink-1: rgba(255,255,255,0.82);
    --ink-2: rgba(255,255,255,0.56);
    --ink-3: rgba(255,255,255,0.36);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden; background: var(--bg-0); color: var(--ink-0);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility; cursor: none;
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: 100; pointer-events: none;
    opacity: 0.035; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .stage { position: fixed; inset: 0; overflow: hidden; }

  .card {
    position: absolute; inset: 0; opacity: 0; transform: scale(1.018);
    transition: opacity 1.4s cubic-bezier(0.32,0.72,0,1), transform 7s cubic-bezier(0.22,0.61,0.36,1);
    pointer-events: none;
  }
  .card.active { opacity: 1; transform: scale(1); pointer-events: auto; }

  .card-image {
    position: absolute; inset: 0; background-size: cover; background-position: center;
    transform: scale(1.07); transition: transform 12s linear;
  }
  .card.active .card-image { transform: scale(1.0); }

  .card::before {
    content: ""; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg, rgba(7,5,12,0.4) 0%, rgba(7,5,12,0) 24%, rgba(7,5,12,0) 44%, rgba(7,5,12,0.6) 78%, rgba(7,5,12,0.94) 100%);
  }
  .card::after {
    content: ""; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(90deg, rgba(7,5,12,0.55) 0%, rgba(7,5,12,0) 42%, rgba(7,5,12,0) 100%);
  }

  .card.concept .card-image {
    background: radial-gradient(ellipse at 25% 75%, rgba(155,134,255,0.22) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 25%, rgba(120,95,220,0.18) 0%, transparent 55%),
                linear-gradient(170deg, #0a0716 0%, #161029 50%, #1f1438 100%);
  }
  .card.concept-generated .card-image { animation: slowDrift 50s linear infinite; }
  @keyframes slowDrift { from { filter: hue-rotate(0deg);} to { filter: hue-rotate(40deg);} }

  /* CARD CONTENT */
  .card-content {
    position: relative; z-index: 2; width: 100%; height: 100%;
    padding: 96px 112px; display: flex; flex-direction: column; justify-content: flex-end;
  }
  .card-title {
    font-size: clamp(48px, 4.6vw, 72px); font-weight: 600; line-height: 1.04; letter-spacing: -0.032em;
    max-width: 17ch; color: var(--ink-0); opacity: 0; transform: translateY(18px); text-wrap: balance;
    transition: opacity 1.1s 0.4s cubic-bezier(0.32,0.72,0,1), transform 1.1s 0.4s cubic-bezier(0.32,0.72,0,1);
  }
  /* Long action-led headlines auto-shrink a touch so they stay on 2–3 elegant lines */
  .card-title:not(:empty) { hyphens: none; }
  .card.active .card-title { opacity: 1; transform: translateY(0); }
  .card-sub {
    margin-top: 18px; font-size: 20px; font-weight: 400; color: var(--ink-1);
    max-width: 680px; line-height: 1.4; letter-spacing: -0.005em; opacity: 0; transform: translateY(12px);
    transition: opacity 1.1s 0.65s cubic-bezier(0.32,0.72,0,1), transform 1.1s 0.65s cubic-bezier(0.32,0.72,0,1);
  }
  .card.active .card-sub { opacity: 1; transform: translateY(0); }

  /* AGENT LINE — text left, mascot rides at end like a pen tip */
  .agent-line {
    display: flex; align-items: center; gap: 14px;
    font-family: "New York", Georgia, serif; font-size: 21px; font-style: italic;
    color: var(--violet-100); letter-spacing: -0.012em; line-height: 1.35;
    max-width: 820px; margin-top: 36px; min-height: 38px;
    position: relative; z-index: 5; pointer-events: none; opacity: 0; transform: translateY(8px);
    transition: opacity 0.8s 1.1s cubic-bezier(0.32,0.72,0,1), transform 0.8s 1.1s cubic-bezier(0.32,0.72,0,1);
  }
  .card.active .agent-line { opacity: 1; transform: translateY(0); }
  .typed-text { display: inline-block; line-height: 1.35; text-align: left; }

  /* MASCOT */
  .agent-mascot {
    flex-shrink: 0; display: inline-block; position: relative; width: 38px; height: 38px;
    z-index: 2; will-change: transform; transition: transform 880ms cubic-bezier(0.65,0,0.35,1);
  }
  .agent-mascot.docked-cta { transform: translate(var(--dock-x,0px), var(--dock-y,0px)) scale(0.7); }
  .agent-mascot.is-traveling .mascot-svg,
  .agent-mascot.is-traveling .mascot-svg .m-body,
  .agent-mascot.is-traveling .mascot-svg .m-eyes { animation-play-state: paused; }
  .agent-mascot.is-traveling::before { opacity: 0.85; animation-duration: 4s; }
  .agent-mascot::before {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    background: conic-gradient(from 0deg, var(--violet-200) 0deg, var(--violet-400) 90deg, var(--violet-300) 180deg, var(--violet-100) 270deg, var(--violet-200) 360deg);
    filter: blur(7px); opacity: 0.55; z-index: -1; animation: glyphSpin 7s linear infinite;
  }
  @keyframes glyphSpin { to { transform: rotate(360deg); } }
  .agent-mascot::after {
    content: ""; position: absolute; inset: -6px; border-radius: 50%;
    background: radial-gradient(circle, rgba(181,163,255,0.35) 0%, rgba(126,104,242,0) 65%);
    z-index: -2; animation: mascotGlow 3.6s ease-in-out infinite;
  }
  @keyframes mascotGlow { 0%,100% {opacity:0.7;} 50% {opacity:1;} }
  .mascot-svg {
    width: 100%; height: 100%; overflow: visible; animation: mascotBob 4.2s ease-in-out infinite;
    filter: drop-shadow(0 3px 8px rgba(95,75,217,0.55)); transition: filter 0.6s ease;
  }
  @keyframes mascotBob { 0%,100% {transform:translateY(0);} 50% {transform:translateY(-1.5px);} }
  .mascot-svg .m-body { transform-origin: center; transform-box: fill-box; animation: mascotBreath 3.4s ease-in-out infinite; transition: transform 0.6s cubic-bezier(0.32,0.72,0,1); }
  @keyframes mascotBreath { 0%,100% {transform:scale(1);} 50% {transform:scale(1.035);} }
  .mascot-svg .m-eyes { transform-origin: center; transform-box: fill-box; animation: mascotBlink 5.6s infinite; transition: transform 0.5s cubic-bezier(0.32,0.72,0,1); }
  @keyframes mascotBlink { 0%,88%,100% {transform:scaleY(1);} 91%,94% {transform:scaleY(0.1);} }
  .mascot-svg .pupil, .mascot-svg .eye-glint, .mascot-svg .m-mouth, .mascot-svg .m-brow { transition: transform 0.6s cubic-bezier(0.32,0.72,0,1); }
  .agent-line.is-typing .mascot-svg .pupil { transform: translateX(0.5px) translateY(0.2px); }
  .agent-line.is-typing .mascot-svg { animation: mascotBobTalking 1.1s ease-in-out infinite; }
  @keyframes mascotBobTalking { 0%,100% {transform:translateY(0);} 50% {transform:translateY(-1.5px);} }

  /* MOODS */
  .agent-line.mood-curious .mascot-svg { transform: rotate(-6deg); }
  .agent-line.mood-curious .mascot-svg .m-brow { transform: translateY(-1.2px); }
  .agent-line.mood-confident .mascot-svg .m-mouth { transform: scaleX(1.15); }
  .agent-line.mood-confident .mascot-svg { filter: drop-shadow(0 3px 12px rgba(155,134,255,0.7)); }
  .agent-line.mood-hesitant .mascot-svg .pupil { transform: translateX(-1.2px); }
  .agent-line.mood-hesitant .mascot-svg { filter: drop-shadow(0 3px 6px rgba(95,75,217,0.35)); opacity: 0.92; }
  .agent-line.mood-proud .mascot-svg .m-mouth { transform: scaleX(1.25) translateY(-0.4px); }
  .agent-line.mood-proud .agent-mascot::before { opacity: 0.85; animation: glyphSpin 4s linear infinite; }
  .agent-line.mood-proud .mascot-svg { filter: drop-shadow(0 3px 14px rgba(181,163,255,0.85)); }
  .agent-line.mood-thinking .mascot-svg .pupil { transform: translateY(-1px) translateX(0.6px); }

  /* CTA */
  .card-actions { margin-top: 32px; display: flex; align-items: center; gap: 24px; opacity: 1; }
  .cta-button {
    display: inline-flex; align-items: center; gap: 12px; padding: 13px 22px 13px 14px;
    background: linear-gradient(135deg, rgba(216,204,255,0.18) 0%, rgba(126,104,242,0.10) 100%);
    border: 0.5px solid rgba(216,204,255,0.32); border-radius: 100px;
    font-size: 15px; font-weight: 500; color: var(--ink-0); letter-spacing: -0.008em;
    backdrop-filter: blur(32px) saturate(180%); -webkit-backdrop-filter: blur(32px) saturate(180%);
    box-shadow: 0 6px 22px rgba(126,104,242,0.22), 0 0 0 0.5px rgba(216,204,255,0.10), inset 0 1px 0 rgba(255,255,255,0.18);
    position: relative; opacity: 0; transform: scale(0.6); transform-origin: 27px center; pointer-events: none;
    transition: opacity 500ms cubic-bezier(0.32,0.72,0,1), transform 500ms cubic-bezier(0.32,0.72,0,1), box-shadow 400ms;
  }
  .cta-button.measuring { transform: scale(1); transition: none; }
  .cta-button.landed { opacity: 1; transform: scale(1); pointer-events: auto; }
  .cta-button:hover { box-shadow: 0 10px 28px rgba(126,104,242,0.32), 0 0 0 0.5px rgba(216,204,255,0.18), inset 0 1px 0 rgba(255,255,255,0.24); }
  .cta-button::before {
    content: ""; position: absolute; inset: -1px; border-radius: 100px; padding: 1px;
    background: conic-gradient(from 0deg, rgba(181,163,255,0.9) 0deg, rgba(216,204,255,0) 60deg, rgba(216,204,255,0) 300deg, rgba(181,163,255,0.9) 360deg);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: 0.7; animation: glyphSpin 6s linear infinite; pointer-events: none;
  }
  .cta-question {
    font-family: "New York", Georgia, serif; font-style: italic; font-weight: 400; color: var(--ink-0); letter-spacing: -0.012em; font-size: 16px;
    opacity: 0; transform: translateX(-3px); transition: opacity 500ms cubic-bezier(0.32,0.72,0,1), transform 500ms;
  }
  .cta-yes {
    display: inline-flex; align-items: center; margin-left: 6px; padding: 5px 12px; border-radius: 100px;
    background: linear-gradient(135deg, var(--violet-300), var(--violet-500)); color: #1B0F36;
    font-family: -apple-system, sans-serif; font-style: normal; font-size: 13px; font-weight: 600; letter-spacing: -0.005em;
    box-shadow: 0 4px 14px rgba(155,134,255,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
    opacity: 0; transform: translateX(-3px); transition: opacity 500ms cubic-bezier(0.32,0.72,0,1), transform 500ms;
  }
  .cta-button.landed .cta-question, .cta-button.landed .cta-yes { opacity: 1; transform: translateX(0); transition-delay: 400ms; }
  .cta-button.landed .cta-yes { transition-delay: 520ms; }
  .cta-dock { flex-shrink: 0; width: 26px; height: 26px; display: inline-block; position: relative; }

  /* CATEGORY TAG */
  .card-tag {
    position: absolute; top: 116px; left: 112px; z-index: 3; display: inline-flex; align-items: center; gap: 9px;
    padding: 7px 13px; border-radius: 100px; background: rgba(255,255,255,0.06);
    backdrop-filter: blur(28px) saturate(140%); -webkit-backdrop-filter: blur(28px) saturate(140%);
    border: 0.5px solid rgba(255,255,255,0.14); font-size: 10px; font-weight: 500; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-1); opacity: 0; transform: translateY(6px);
    transition: opacity 0.9s 0.3s cubic-bezier(0.32,0.72,0,1), transform 0.9s 0.3s;
  }
  .card.active .card-tag { opacity: 1; transform: translateY(0); }
  .card-tag::before { content: ""; width: 4px; height: 4px; border-radius: 50%; background: var(--violet-300); }

  /* WEATHER STRIP (small, on feed cards) */
  .weather-strip {
    position: absolute; top: 116px; left: 112px; z-index: 3; display: inline-flex; align-items: center; gap: 12px;
    padding: 8px 14px 8px 10px; border-radius: 100px; background: rgba(255,255,255,0.06);
    backdrop-filter: blur(28px) saturate(140%); border: 0.5px solid rgba(255,255,255,0.14);
    font-size: 12px; font-weight: 500; color: var(--ink-1); letter-spacing: -0.005em; opacity: 0; transform: translateY(6px);
    transition: opacity 0.9s 0.3s cubic-bezier(0.32,0.72,0,1), transform 0.9s 0.3s;
  }
  .card.active .weather-strip { opacity: 1; transform: translateY(0); }
  .weather-strip .ic { font-size: 16px; }
  .weather-strip .temp { font-weight: 600; color: var(--ink-0); font-variant-numeric: tabular-nums; }
  .weather-strip .sep { width: 1px; height: 12px; background: rgba(255,255,255,0.18); }

  /* GEN BADGE */
  .gen-badge {
    position: absolute; top: 116px; right: 112px; z-index: 4; font-size: 10px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--violet-200); display: none; align-items: center; gap: 8px;
    opacity: 0; transition: opacity 0.9s 0.4s ease;
  }
  .card.has-gen-badge .gen-badge { display: flex; }
  .card.active.has-gen-badge .gen-badge { opacity: 1; }
  .gen-badge::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--violet-300); box-shadow: 0 0 8px var(--violet-300); animation: pulseBadge 2.4s ease-in-out infinite; }
  @keyframes pulseBadge { 0%,100% {opacity:1;transform:scale(1);} 50% {opacity:0.45;transform:scale(1.5);} }

  /* ===== SHOP CARD — two circular product tiles at the end of the CTA row, price beneath ===== */
  .card.shop-card .card-actions { flex-wrap: wrap; gap: 18px; align-items: center; }
  .shop-products {
    display: inline-flex; gap: 18px; align-items: flex-start; margin-left: auto;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.8s cubic-bezier(0.32,0.72,0,1), transform 0.8s cubic-bezier(0.32,0.72,0,1);
  }
  .card.reveal-after.revealed .card-actions .shop-products { opacity: 1; transform: translateY(0); transition-delay: 480ms; }
  .shop-product {
    display: inline-flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; position: relative; padding: 0; border: none; background: none;
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  }
  .shop-product:hover { transform: translateY(-3px); }
  .shop-product-img {
    position: relative; flex-shrink: 0; width: 56px; height: 56px; border-radius: 50%;
    background-size: cover; background-position: center top; background-color: rgba(155,134,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.22); box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .shop-product:hover .shop-product-img { border-color: rgba(216,204,255,0.6); box-shadow: 0 10px 26px rgba(126,104,242,0.4); }
  .shop-product.selected .shop-product-img { border-color: var(--violet-300); box-shadow: 0 0 0 2px var(--violet-400), 0 10px 26px rgba(155,134,255,0.5); }
  .shop-product.selected .shop-product-img::after {
    content: "✓"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(126,104,242,0.78); color: #fff; font-size: 18px; font-weight: 700; border-radius: 50%;
    animation: tilePop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .shop-product-price { font-size: 13px; font-weight: 600; color: var(--ink-0); letter-spacing: -0.01em; font-variant-numeric: tabular-nums; white-space: nowrap; }

  /* ===== HERO INTRO — agent front and center ===== */
  .card.hero-intro .card-image {
    background: radial-gradient(ellipse at 50% 42%, rgba(155,134,255,0.32) 0%, transparent 58%),
                radial-gradient(ellipse at 20% 80%, rgba(120,95,220,0.18) 0%, transparent 50%),
                linear-gradient(175deg, #07050C 0%, #110a22 55%, #1c1136 100%);
    animation: bgDrift 16s ease-in-out infinite;
  }
  @keyframes bgDrift { 0%,100% {filter:hue-rotate(0deg) brightness(1);} 50% {filter:hue-rotate(15deg) brightness(1.08);} }
  .hero-content {
    position: relative; z-index: 2; width: 100%; height: 100%; padding: 80px 112px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  }
  .hero-mascot {
    width: 132px; height: 132px; position: relative; margin-bottom: 44px; opacity: 0; transform: scale(0.6);
    transition: opacity 1s cubic-bezier(0.32,0.72,0,1), transform 1.1s cubic-bezier(0.34,1.3,0.5,1);
  }
  .card.active .hero-mascot { opacity: 1; transform: scale(1); }
  .hero-mascot .agent-mascot { width: 132px; height: 132px; transform: none; }
  .hero-mascot .agent-mascot::after { inset: -28px; background: radial-gradient(circle, rgba(181,163,255,0.5) 0%, rgba(126,104,242,0) 68%); }
  .hero-title {
    font-size: 88px; font-weight: 600; line-height: 0.98; letter-spacing: -0.04em; color: var(--ink-0); max-width: 1000px;
    opacity: 0; transform: translateY(16px); transition: opacity 1s 0.5s cubic-bezier(0.32,0.72,0,1), transform 1s 0.5s;
  }
  .card.active .hero-title { opacity: 1; transform: translateY(0); }
  .hero-typed-line {
    margin-top: 30px; font-family: "New York", Georgia, serif; font-size: 27px; font-style: italic;
    color: var(--violet-100); line-height: 1.4; max-width: 860px; min-height: 40px;
  }
  .hero-content .card-actions { margin-top: 48px; justify-content: center; }

  /* ===== CONTEXT REVEAL — agent reasons first, glance reveals after ===== */
  .card.reveal-after .card-title, .card.reveal-after .card-sub,
  .card.reveal-after .card-tag, .card.reveal-after .weather-strip {
    opacity: 0; transform: translateY(18px);
    transition: opacity 1.0s cubic-bezier(0.32,0.72,0,1), transform 1.0s cubic-bezier(0.32,0.72,0,1);
  }
  .card.reveal-after.revealed .card-title { opacity: 1; transform: translateY(0); }
  .card.reveal-after.revealed .card-sub   { opacity: 1; transform: translateY(0); transition-delay: 160ms; }
  .card.reveal-after.revealed .card-tag   { opacity: 1; transform: translateY(0); }
  .card.reveal-after.revealed .weather-strip { opacity: 1; transform: translateY(0); }
  .card.reveal-after .agent-line { order: -1; margin-top: 0; margin-bottom: 30px; }

  /* ===== CENTER-STAGE WEATHER ===== */
  .card.weather-card .card-image {
    background: radial-gradient(ellipse at 50% 35%, rgba(155,134,255,0.18) 0%, transparent 60%),
                linear-gradient(180deg, rgba(7,5,12,0.55), rgba(7,5,12,0.35)),
                var(--wimg, none);
    background-size: cover; background-position: center;
  }
  .weather-content {
    position: relative; z-index: 2; width: 100%; height: 100%; padding: 80px 112px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  }
  .weather-lead {
    display: flex; align-items: center; gap: 16px; font-family: "New York", Georgia, serif;
    font-size: 26px; font-style: italic; color: var(--violet-100); line-height: 1.4; max-width: 900px; min-height: 44px;
    margin-bottom: 36px; text-shadow: 0 2px 16px rgba(0,0,0,0.6);
  }
  .weather-hero { display: flex; align-items: center; justify-content: center; gap: 36px; opacity: 0; transform: translateY(15px);
    transition: opacity 1.1s cubic-bezier(0.32,0.72,0,1), transform 1.1s; }
  .card.revealed .weather-hero { opacity: 1; transform: translateY(0); }
  .weather-glyph { font-size: 120px; line-height: 1; filter: drop-shadow(0 6px 24px rgba(155,134,255,0.6)); animation: wFloat 5s ease-in-out infinite; }
  @keyframes wFloat { 0%,100% {transform:translateY(0);} 50% {transform:translateY(-8px);} }
  .weather-temp { font-size: 150px; font-weight: 200; line-height: 1; letter-spacing: -0.05em; color: var(--ink-0); font-variant-numeric: tabular-nums; }
  .weather-temp .deg { font-size: 72px; color: var(--ink-2); vertical-align: top; }
  .weather-meta { margin-top: 18px; display: flex; align-items: center; justify-content: center; gap: 24px;
    font-size: 17px; font-weight: 500; color: var(--ink-2); opacity: 0; transition: opacity 1.0s 0.3s; }
  .card.revealed .weather-meta { opacity: 1; }
  .weather-meta .sep { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-3); }
  .weather-sub { margin-top: 26px; font-size: 21px; color: var(--ink-1); max-width: 640px; line-height: 1.4;
    opacity: 0; transform: translateY(10px); transition: opacity 1.0s 0.5s cubic-bezier(0.32,0.72,0,1), transform 1.0s 0.5s; }
  .card.revealed .weather-sub { opacity: 1; transform: translateY(0); }
  .weather-content .card-actions { margin-top: 44px; justify-content: center; opacity: 0; transition: opacity 0.6s; }
  .card.revealed .weather-content .card-actions { opacity: 1; }

  /* ===== PREFERENCE CARDS — visual tiles ===== */
  .card.preference .card-image {
    background: radial-gradient(ellipse at 50% 30%, rgba(155,134,255,0.28) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(120,95,220,0.18) 0%, transparent 50%),

      if (/\b(?:you opened|you tend|you return|you linger|you spend more time|you go deeper|you usually move past)\b/i.test(text)) s += 5;
    }
    const len = text.length;
    if (len >= 80 && len <= 150) s += 3;
    else if (len < 60 || len > 170) s -= 2;
    if (/\b(?:worth a look|your kind of|a Bangalore favourite|tuned to your)\b/i.test(text)) s -= 5;
    return s;

  // Inject feed cards from the bank into the stage, after the baked intro/pref cards.
  // Audience guard: a card with an 'audience' value only shows to that user state.
  // Order is determined by reasoning quality + diversity rules.
  function injectFeed(){
    const stage=document.getElementById('stage');
    const offers=[...stage.querySelectorAll('.card.offer')];
    offers.forEach(o=>o.remove());

    const candidates = FEED_IDS
      .map(id => (id==='c090'||id==='weather') ? {id, isWeather:true, row:null}
                                                : {id, isWeather:false, row:BANK[id]})
      .filter(c => c.isWeather || (c.row && (!(c.row.audience||'').trim() || (c.row.audience||'').trim().toLowerCase()===STATE)));

    candidates.forEach(c => {
      c.score = c.isWeather ? 999 : reasoningScore(c.row, STATE);
      c.cat   = c.isWeather ? 'Weather' : (c.row.category||'').trim();
    });
    candidates.sort((a,b) => b.score - a.score);

    const ordered = [];
    const seenCount = {};
    const remaining = [...candidates];
    while (remaining.length) {
      let pickIdx = -1;
      for (let i=0; i<remaining.length; i++) {
        const c = remaining[i];
        const lastCat = ordered.length ? ordered[ordered.length-1].cat : null;
        const top10Count = seenCount[c.cat] || 0;
        if (c.cat !== lastCat && !(ordered.length < 10 && top10Count >= 2)) { pickIdx = i; break; }
      }
      if (pickIdx === -1) pickIdx = 0;
      const chosen = remaining.splice(pickIdx, 1)[0];
      ordered.push(chosen);
      if (ordered.length <= 10) seenCount[chosen.cat] = (seenCount[chosen.cat]||0) + 1;
    }

    let idx=0;
    ordered.forEach(c => {
      if (c.isWeather) { stage.appendChild(buildWeatherCard()); idx++; return; }
      stage.appendChild(buildFeedCard(c.row, idx)); idx++;
    });

    // Re-insert offer cards at their target feed position (counting feed cards only).
    offers.forEach(o=>{
      const pos=parseInt(o.dataset.feedPos||'5',10);
      const feedCards=[...stage.querySelectorAll('.card')].filter(c=>!c.classList.contains('offer'));
      const anchor=feedCards[pos];   // insert before the card at this index
      if(anchor) stage.insertBefore(o,anchor); else stage.appendChild(o);
    });
  }

  // ===== LIVE INTEREST MODEL — record interest, re-rank instantly =====
  const IKEY='glance_interests_'+STATE;
  function loadInterests(){ try{return JSON.parse(localStorage.getItem(IKEY))||{};}catch(e){return {};} }
  let INTERESTS=loadInterests();
  function saveInterests(){ try{localStorage.setItem(IKEY,JSON.stringify(INTERESTS));}catch(e){} }
  function cardTags(card){ const r=REASONS[card.dataset.id]; const prefs=(card.dataset.prefs||'').split('|').filter(Boolean); return prefs.concat(r&&r.tag?[r.tag]:[]); }
  function bumpInterest(card,w){ cardTags(card).forEach(t=>{ if(t) INTERESTS[t]=(INTERESTS[t]||0)+w; }); saveInterests(); }
  function topInterest(){ let b=null,bw=0; for(const t in INTERESTS){ if(INTERESTS[t]>bw){bw=INTERESTS[t];b=t;} } return b; }
  function reRankUpcoming(){
    const stage=document.getElementById('stage');
    const all=[...document.querySelectorAll('.card')];
    const tail=all.slice(currentIndex+1).filter(c=>c.classList.contains('reveal-after'));
    if(tail.length<2) return false;
    const score=c=>{ let s=0; cardTags(c).forEach(t=>s+=(INTERESTS[t]||0)); if(c.dataset.urgency==='timely')s+=0.15; return s; };
    // Sort by score, then run diversity pass: avoid same-category back-to-back
    const ranked=[...tail].sort((a,b)=>score(b)-score(a));
    const sorted=[]; const pool=[...ranked];
    while(pool.length){
      let idx = pool.findIndex(c => !sorted.length || (c.dataset.cat||'') !== (sorted[sorted.length-1].dataset.cat||''));
      if(idx === -1) idx = 0;
      sorted.push(pool.splice(idx,1)[0]);
    }
    if(sorted.every((c,i)=>c===tail[i])) return false;      // no change
    const ref=tail[tail.length-1].nextSibling;
    sorted.forEach(c=>stage.insertBefore(c,ref));
    cards=document.querySelectorAll('.card');
    return true;
  }

  // Build the agent reasoning line + CTA from the card + state/profile.
  function personalize(card){
    const id=card.dataset.id;
    const cat=(card.dataset.cat||'').toLowerCase();
    const intent=card.dataset.intent||'inspire';
    const r = REASONS[id] || {};
    // Card-level CTA from the CSV, chosen by state; fall back to the category map.
    const csvCta = STATE==='cold' ? r.ctaCold : STATE==='warm' ? r.ctaWarm : r.ctaEnr;
    let reasoning, cta = (csvCta && csvCta.trim()) || ctaFor(cat, intent);

    // Per-card specific reasoning, chosen by state. If the user has shown
    // interest in this card's tag, prefer a "because you're into X" line.
    const tagInterested = r.tag && (INTERESTS[r.tag]||0) >= 1;
    if (STATE==='cold'){
      reasoning = tagInterested
        ? `More ${r.tag} — since you leaned into that.`
        : (r.cold || `A ${CTX.city} favourite worth a look this ${CTX.timeOfDay}.`);
    } else if (STATE==='warm'){
      reasoning = tagInterested
        ? `More ${r.tag}, like you just showed me.`
        : (r.warm || r.cold || `A pick that fits where your taste is heading.`);
    } else { // enriched
      const enrText = (window.GLANCE_ENRICHED_PROFILE === 'e2') ? r.e2 : r.e1;
      reasoning = tagInterested
        ? `Doubling down on ${r.tag} — you clearly like it.`
        : (enrText || r.warm || r.cold || `Tuned to your taste.`);
    }
    return {reasoning, cta};
  }

    return sum ? `From what I know of you — this fits.` : `Tuned to your taste.`;

    const cta=card.querySelector('.offer-cta'); if(cta) cta.classList.add('done');
    if(prefAck){ prefAckText.textContent=`Love it — I'm on it. Just tell me how you'd like it.`; prefAck.classList.add('show'); sparkles(); launchTimers.push(setTimeout(()=>prefAck.classList.remove('show'),1700)); }
    launchTimers.push(setTimeout(()=>{ const how=card.querySelector('.offer-how'); if(how) how.classList.add('show'); const pt=card.querySelector('.offer-how .pref-tiles'); if(pt) pt.classList.add('revealed'); },650));
  }
  function scheduleAuto(card){ if(!autoMode)return; if(card.querySelector('.pref-tiles')||card.classList.contains('offer'))return; if(autoTimer)clearTimeout(autoTimer); autoTimer=setTimeout(()=>{ if(autoMode) goNext(false,true); }, dwellFor(card)); }
  function goNext(manual,auto){ currentIndex=Math.min(currentIndex+1,cards.length-1); showCard(currentIndex, auto===true?true:false); if(manual) pauseAuto(); }
  function goPrev(){ currentIndex=Math.max(currentIndex-1,0); showCard(currentIndex,false); pauseAuto(); }
  function pauseAuto(){ autoMode=false; if(autoTimer){clearTimeout(autoTimer);autoTimer=null;} if(idleResumeTimer)clearTimeout(idleResumeTimer); idleResumeTimer=setTimeout(()=>{autoMode=true; showCard(currentIndex,true);},12000); }
  document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'){e.preventDefault();goNext(true);} if(e.key==='ArrowUp'){e.preventDefault();goPrev();} });

  // ===== E1/E2 profile switcher =====
  // Default to E1; toggle re-injects the feed with the other profile's reasoning + new ordering.
  window.GLANCE_ENRICHED_PROFILE = window.GLANCE_ENRICHED_PROFILE || 'e1';
  document.querySelectorAll('#profile-switcher .profile-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(btn.classList.contains('active')) return;
      document.querySelectorAll('#profile-switcher .profile-btn').forEach(b=>{
        const isActive = (b===btn);
        b.classList.toggle('active', isActive);
        b.style.background = isActive ? 'rgba(126,104,242,0.4)' : 'transparent';
        b.style.color      = isActive ? '#fff' : '#D8CCFF';
      });
      window.GLANCE_ENRICHED_PROFILE = btn.dataset.profile;
      // Clear any feed/weather cards that injectFeed produced; keep the baked intro/preference cards intact.
      document.querySelectorAll('#stage .card.reveal-after, #stage .card.weather-card').forEach(c=>c.remove());
      // Reset the live interest model so the new profile starts fresh.
      INTERESTS = {};
      saveInterests();
      injectFeed();
      cards = document.querySelectorAll('.card');
      currentIndex = 0;
      // Re-hydrate the freshly injected cards.
      if(typeof init==='function') init();
    });
  });

  // Boot: load the CSV (single source of truth), inject the feed, then hydrate + start.
  loadBank().then(()=>{ injectFeed(); init(); })
    .catch(err=>{
      const s=document.getElementById('stage');
      const m=document.createElement('div'); m.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px;color:#D8CCFF;font-family:Georgia,serif;font-style:italic;font-size:22px;z-index:99';
      m.innerHTML="Couldn't load the content bank.<br><span style='font-size:15px;color:#9B86FF'>Serve this folder over http:// — e.g. <code>python3 -m http.server</code> — then open this page.</span>";
      s.appendChild(m); console.error(err);
    });

</script></body></html>
